<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>Hermes Pet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent !important; overflow: hidden; }
  .pet-container {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative; cursor: grab; user-select: none;
    -webkit-app-region: no-drag;
  }
  .pet-container:active { cursor: grabbing; }
  .pet-body {
    position: relative; width: 100%; height: 100%;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    transition: transform 0.2s ease;
  }
  .pet-video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
  .pet-thinking {
    position: absolute; top: 16%; left: 50%;
    transform: translateX(-50%) scale(0.65); transform-origin: center bottom;
    z-index: 2; overflow: hidden;
    background: rgba(10,10,10,0.94); border-radius: 100px; padding: 4px 16px;
    font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.6);
    white-space: nowrap; border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 6px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    height: 34px; min-width: 120px; display: none;
    align-items: center; justify-content: center; box-sizing: border-box;
  }
  .pet-thinking.show { display: flex; }
  .pet-thinking-text { position: relative; z-index: 1; }
  .pet-thinking-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 45%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.06) 55%, transparent 100%);
    background-size: 200% 100%; animation: petShimmer 1.8s ease-in-out infinite;
  }
  @keyframes petShimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
</style>
</head>
<body>
<div id="pet-container" class="pet-container">
  <div id="thinking" class="pet-thinking">
    <span class="pet-thinking-text">思考中…</span>
    <div class="pet-thinking-shimmer"></div>
  </div>
  <div id="pet-body" class="pet-body">
    <video id="pet-video" class="pet-video" autoplay muted playsinline></video>
  </div>
</div>
<script>
(function () {
  'use strict'

  // ── Animation state machine (faithful port of src/pet/App.tsx ANIM_MAP) ──
  var ANIM_MAP = {
    begin:         { src: 'pet-assets/begin.webm',       loop: false, next: 'static' },
    static:        { src: 'pet-assets/static.webm',      loop: true },
    listening:     { src: 'pet-assets/static.webm',      loop: true },
    'task-start':  { src: 'pet-assets/task-start.webm',  loop: false, next: 'task-loop', waitOnExit: true },
    'task-loop':   { src: 'pet-assets/task-loop.webm',   loop: true,  waitOnExit: true },
    'task-leave':  { src: 'pet-assets/task-leave.webm',  loop: false, next: 'static' },
    'sleep-start': { src: 'pet-assets/sleep-start.webm', loop: false, next: 'sleep-loop' },
    'sleep-loop':  { src: 'pet-assets/sleep-loop.webm',  loop: true },
    'sleep-leave': { src: 'pet-assets/sleep-leave.webm', loop: false, next: 'static' },
  }
  // States that may interrupt a waitOnExit animation immediately.
  var WAIT_EXEMPT = { 'static': true, 'task-start': true }

  var video = document.getElementById('pet-video')
  var petBody = document.getElementById('pet-body')
  var thinking = document.getElementById('thinking')
  var container = document.getElementById('pet-container')

  var current = ''          // currently playing state
  var pending = null        // state queued until current waitOnExit anim finishes
  var direction = 'right'

  function playAnim(state) {
    var cfg = ANIM_MAP[state]
    if (!cfg) return
    current = state
    pending = null
    video.src = cfg.src
    video.load()
    var play = function () { video.play().catch(function () {}) }
    if (video.readyState >= 2) play()
    else video.addEventListener('canplay', play, { once: true })
    try { if (window.hermesPet && window.hermesPet.animStateChanged) window.hermesPet.animStateChanged(state) } catch (_) {}
  }

  // Request a transition to `state`, respecting waitOnExit on the current anim.
  function setAnimState(state) {
    if (!state || !ANIM_MAP[state]) return
    if (current === state) { pending = null; return }
    var prevCfg = ANIM_MAP[current]
    if (prevCfg && prevCfg.waitOnExit && !WAIT_EXEMPT[state]) {
      // Don't cut off task-start/task-loop mid-frame; queue until it ends.
      pending = state
      return
    }
    playAnim(state)
  }

  video.addEventListener('ended', function () {
    if (pending) { playAnim(pending); return }
    var cfg = ANIM_MAP[current]
    if (cfg && cfg.loop) { video.currentTime = 0; video.play().catch(function () {}) }
    else if (cfg && cfg.next) playAnim(cfg.next)
  })

  // ── IPC wiring (window.hermesPet exposed by pet-preload.cjs) ──
  function wireApi() {
    var api = window.hermesPet
    if (!api) return false
    if (api.onAnimState) api.onAnimState(function (s) {
      setAnimState(s)
      if (s !== 'listening') setThinking(false)
    })
    if (api.onDirectionChange) api.onDirectionChange(function (d) {
      if (d === 'left' || d === 'right') { direction = d; applyDirection() }
    })
    if (api.onThinking) api.onThinking(function (active) { setThinking(!!active) })
    return true
  }

  function applyDirection() {
    petBody.style.transform = 'scaleX(' + (direction === 'left' ? -1 : 1) + ')'
  }
  function setThinking(active) {
    if (active) thinking.classList.add('show')
    else thinking.classList.remove('show')
  }

  // ── Pointer interactions (drag / click / dblclick / context menu) ──
  var dragging = false
  var lastClickTime = 0
  var clickTimer = null

  container.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return
    dragging = true
    try { window.hermesPet && window.hermesPet.startDrag && window.hermesPet.startDrag(e.screenX, e.screenY) } catch (_) {}
    var onMove = function (ev) {
      if (dragging) { try { window.hermesPet && window.hermesPet.dragMove && window.hermesPet.dragMove(ev.screenX, ev.screenY) } catch (_) {} }
    }
    var onUp = function () {
      dragging = false
      try { window.hermesPet && window.hermesPet.stopDrag && window.hermesPet.stopDrag() } catch (_) {}
      window.removeEventListener('mousemove', onMove)
      window.removeEventListener('mouseup', onUp)
    }
    window.addEventListener('mousemove', onMove)
    window.addEventListener('mouseup', onUp)
  })

  container.addEventListener('click', function () {
    var now = Date.now()
    var last = lastClickTime
    lastClickTime = now
    if (last && now - last < 400) {
      // double click → toggle window
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null }
      try { window.hermesPet && window.hermesPet.toggleWindow && window.hermesPet.toggleWindow() } catch (_) {}
      lastClickTime = 0
    } else {
      // single click (delayed to disambiguate) → toggle chat
      clickTimer = setTimeout(function () {
        clickTimer = null
        try { window.hermesPet && window.hermesPet.toggleChat && window.hermesPet.toggleChat() } catch (_) {}
      }, 400)
    }
  })

  container.addEventListener('contextmenu', function (e) {
    e.preventDefault()
    try { window.hermesPet && window.hermesPet.showContextMenu && window.hermesPet.showContextMenu() } catch (_) {}
  })

  // ── Boot ──
  applyDirection()
  playAnim('begin')   // entrance animation → auto-transitions to static
  if (!wireApi()) {
    // hermesPet may attach slightly after load; retry briefly.
    var tries = 0
    var iv = setInterval(function () {
      if (wireApi() || ++tries > 50) clearInterval(iv)
    }, 100)
  }
})()
</script>
</body>
</html>
